<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Place an Order</title>
    <link rel="stylesheet" href="practise.css">
</head>
<body>

    <div class="frame">
        <h1>Place an Order</h1>
        
        <fieldset>
            <legend>Billing Address</legend>
            <form>
                <div class="row"><label>First name</label><input type="text"></div>
                <div class="row"><label>Last name</label><input type="text"></div>
                <div class="row"><label>Street Address</label><input type="text"></div>
                <div class="row"><label>City</label><input type="text"></div>
                <div class="row">
                    <label>State</label>
                    <select>
                        <option>AP</option>
                        <option>KA</option>
                        <option>TN</option>
                    </select>
                </div>
            </form>
        </fieldset>
    </div>

</body>
</html>
