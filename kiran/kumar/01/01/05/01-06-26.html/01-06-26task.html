    <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School ID Card</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    
    <div class="kkr"
        
        
        <div class="id-card">
            
            
            <div class="card-header">
                <div class="logo-circle">
                    <span>LOGO</span>
                </div>
                <h1 class="school-name">SCHOOL NAME</h1>
            </div>

            
            <div class="box"
                
                
                <div class="photo-box">
                    
                    <span class="photo-placeholder">PHOTO</span>
                </div>

                
                <div class="details-box">
                    
                    
                    <div class="info-line">
                        <span class="label">ID</span>
                        <div class="line"></div>
                    </div>
                    <div class="info-line">
                        <span class="label">Name</span>
                        <div class="line"></div>
                    </div>
                    <div class="info-line">
                        <span class="label">Class</span>
                        <div class="line"></div>
                    </div>
                    <div class="info-line">
                        <span class="label">D.O.B</span>
                        <div class="line"></div>
                    </div>
                    <div class="info-line">
                        <span class="label">Address</span>
                        <div class="line"></div>
                    </div>
                    <div class="info-line">
                        <span class="label">Phone</span>
                        <div class="line"></div>
                    </div>

                    
                    <div class="footer-row">
                    <div class="signature-section">
                            <div class="Sign></div>
                            <span class="sig-label">principal</span>
                        </div>
                    </div>

                </div> 

            </div> 

        </div> 

    </div>

</body>
</html>
    
</body>
</html>
